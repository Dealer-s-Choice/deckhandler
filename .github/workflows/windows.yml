name: Windows
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  push:
    branches: [ master ]
    paths:
    - '**'
    - '!**.yml'
    - '!**.md'
    - '**/windows.yml'

  pull_request:
    branches: [ master ]
    paths:
    - '**'
    - '!**.yml'
    - '!**.md'
    - '**/windows.yml'

jobs:
  msvc:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install Meson and Ninja
      run: pip install meson ninja

    - name: Meson setup
      env:
        PKG_CONFIG_PATH: ${{ env.VCPKG_INSTALLATION_ROOT }}\installed\x64-windows\lib\pkgconfig
      run: |
        meson setup _build -Db_sanitize=none

    - name: Build
      run: meson compile -C _build

    - name: Test
      run: meson test --no-stdsplit -v -C _build
  MSYS2:
    runs-on: windows-latest
    needs: msvc
    steps:
    - uses: actions/checkout@v6
    - uses: msys2/setup-msys2@v2
      with:
        msystem: mingw64
        pacboy: >-
          gcc:p
          ninja:p
          meson:p
        update: true

    - name: Meson setup
      shell: msys2 {0}
      run: |
        CFLAGS="-Werror" meson setup _build

    - name: Build
      shell: msys2 {0}
      run: |
        meson compile -C _build

    - name: Test
      shell: msys2 {0}
      run: |
        meson test -v -C _build
